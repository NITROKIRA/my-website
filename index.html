<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ping Pong</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: monospace;
    }
    canvas {
      border: 2px solid #fff;
    }
    #score {
      position: absolute;
      top: 20px;
      color: white;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div id="score">0 : 0</div>
  <canvas id="game" width="600" height="400"></canvas>
  <script>
    const cvs = document.getElementById("game");
    const ctx = cvs.getContext("2d");

    const user = {
      x: 0,
      y: cvs.height / 2 - 50,
      width: 10,
      height: 100,
      color: "#fff",
      score: 0,
      speed: 5          // ← slower paddle movement
    };

    const com = {
      x: cvs.width - 10,
      y: cvs.height / 2 - 50,
      width: 10,
      height: 100,
      color: "#fff",
      score: 0
    };

    const ball = {
      x: cvs.width / 2,
      y: cvs.height / 2,
      r: 10,
      speed: 3,          // ← slower initial ball speed
      vx: 3,             // ← reduced horizontal speed
      vy: 3,             // ← reduced vertical speed
      color: "#fff"
    };

    const net = {
      x: cvs.width / 2 - 1,
      y: 0,
      width: 2,
      height: 10,
      color: "#fff"
    };

    const keys = {
      up: false,
      down: false
    };

    function drawRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawCircle(x, y, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, 2 * Math.PI);
      ctx.fill();
    }

    function drawNet() {
      for (let i = 0; i < cvs.height; i += 15) {
        drawRect(net.x, i, net.width, net.height, net.color);
      }
    }

    function drawText(text, x, y, color = "#fff") {
      ctx.fillStyle = color;
      ctx.font = "45px monospace";
      ctx.textAlign = "center";
      ctx.fillText(text, x, y);
    }

    function updateScore() {
      document.getElementById("score").textContent = `${user.score} : ${com.score}`;
    }

    function resetBall() {
      ball.x = cvs.width / 2;
      ball.y = cvs.height / 2;
      ball.vx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
      ball.vy = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
    }

    function collision(b, p) {
      return (
        b.y + b.r > p.y &&
        b.y - b.r < p.y + p.height &&
        b.x + b.r > p.x &&
        b.x - b.r < p.x + p.width
      );
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp") keys.up = true;
      if (e.key === "ArrowDown") keys.down = true;
    });
    document.addEventListener("keyup", (e) => {
      if (e.key === "ArrowUp") keys.up = false;
      if (e.key === "ArrowDown") keys.down = false;
    });

    function moveUserPaddle() {
      if (keys.up && user.y > 0) {
        user.y -= user.speed;
      }
      if (keys.down && user.y < cvs.height - user.height) {
        user.y += user.speed;
      }
    }

    function computerAI() {
      const targetY = ball.y - (com.height / 2);
      const diff = (targetY - com.y) * 0.1;
      com.y += diff;
    }

    function gameLoop() {
      drawRect(0, 0, cvs.width, cvs.height, "#000");

      drawNet();
      drawRect(user.x, user.y, user.width, user.height, user.color);
      drawRect(com.x, com.y, com.width, com.height, com.color);

      drawCircle(ball.x, ball.y, ball.r, ball.color);

      moveUserPaddle();

      ball.x += ball.vx;
      ball.y += ball.vy;

      if (ball.y - ball.r < 0 || ball.y + ball.r > cvs.height) {
        ball.vy = -ball.vy;
      }

      const player = ball.x < cvs.width / 2 ? user : com;
      if (collision(ball, player)) {
        let collidePoint = (ball.y - (player.y + player.height / 2)) / (player.height / 2);
        let angleRad = (Math.PI / 4) * collidePoint;

        let direction = ball.x < cvs.width / 2 ? 1 : -1;

        ball.vx = direction * ball.speed * Math.cos(angleRad);
        ball.vy = ball.speed * Math.sin(angleRad);

        // Optional: make it speed up very slowly
        ball.speed += 0.05;
      }

      if (ball.x + ball.r > cvs.width) {
        user.score++;
        updateScore();
        resetBall();
      } else if (ball.x - ball.r < 0) {
        com.score++;
        updateScore();
        resetBall();
      }

      computerAI();

      requestAnimationFrame(gameLoop);
    }

    updateScore();
    gameLoop();
  </script>
</body>
</html>
